name: fex
on:
  push:
    branches: [main]
    paths: ['fex/**', 'oci/**', '.github/workflows/fex.yml', '.github/workflows/_package-image.yml']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    uses: ./.github/workflows/_package-image.yml
    secrets: inherit
    with:
      package: fex
